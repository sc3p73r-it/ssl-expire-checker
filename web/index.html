<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSL Expiry Checker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="mx-auto max-w-6xl px-4 py-10">
    <header class="mb-10 flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <h1 class="text-3xl font-semibold tracking-tight text-white">SSL Expiry Checker</h1>
        <p class="mt-1 text-sm text-slate-400">Monitor TLS certificates stored in Supabase.</p>
      </div>
      <div id="auth-actions" class="hidden flex gap-2">
        <button id="btn-logout" type="button" class="rounded-lg border border-slate-700 px-4 py-2 text-sm font-medium text-slate-200 hover:bg-slate-900">Sign out</button>
      </div>
    </header>

    <div id="view-auth" class="mx-auto max-w-md rounded-2xl border border-slate-800 bg-slate-900/60 p-8 shadow-xl backdrop-blur">
      <h2 class="text-lg font-medium text-white">Sign in</h2>
      <p class="mt-1 text-sm text-slate-400">Use your Supabase Auth email & password.</p>
      <form id="form-auth" class="mt-6 space-y-4">
        <div>
          <label class="block text-xs font-medium uppercase tracking-wide text-slate-400">Email</label>
          <input id="input-email" type="email" required class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white outline-none ring-emerald-500/40 focus:ring-2" />
        </div>
        <div>
          <label class="block text-xs font-medium uppercase tracking-wide text-slate-400">Password</label>
          <input id="input-password" type="password" required minlength="6" class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white outline-none ring-emerald-500/40 focus:ring-2" />
        </div>
        <p id="auth-error" class="hidden text-sm text-red-400"></p>
        <div class="flex gap-3">
          <button type="submit" id="btn-signin" class="flex-1 rounded-lg bg-emerald-500 px-3 py-2 text-sm font-semibold text-emerald-950 hover:bg-emerald-400">Sign in</button>
          <button type="button" id="btn-signup" class="flex-1 rounded-lg border border-slate-600 px-3 py-2 text-sm font-semibold text-slate-100 hover:bg-slate-800">Create account</button>
        </div>
      </form>
    </div>

    <div id="view-dash" class="hidden space-y-8">
      <section class="rounded-2xl border border-slate-800 bg-slate-900/50 p-6">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-400">Add domain</h2>
        <form id="form-add" class="mt-4 flex flex-col gap-3 sm:flex-row sm:items-end">
          <div class="flex-1">
            <label class="block text-xs text-slate-400">Hostname or URL</label>
            <input id="input-url" type="text" placeholder="example.com or https://example.com" class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white outline-none ring-emerald-500/40 focus:ring-2" />
          </div>
          <button type="submit" class="rounded-lg bg-emerald-500 px-5 py-2 text-sm font-semibold text-emerald-950 hover:bg-emerald-400">Add</button>
        </form>
        <p id="add-error" class="mt-2 hidden text-sm text-red-400"></p>
      </section>

      <section class="rounded-2xl border border-slate-800 bg-slate-900/50 p-6">
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-400">Your domains</h2>
            <p id="threshold-hint" class="mt-1 text-xs text-slate-500"></p>
          </div>
          <button id="btn-scan-all" type="button" class="rounded-lg border border-slate-600 px-4 py-2 text-sm font-semibold text-slate-100 hover:bg-slate-800">Scan all</button>
        </div>
        <div class="mt-4 overflow-x-auto">
          <table class="min-w-full text-left text-sm">
            <thead>
              <tr class="border-b border-slate-800 text-xs uppercase tracking-wide text-slate-500">
                <th class="py-2 pr-4">URL</th>
                <th class="py-2 pr-4">Issuer</th>
                <th class="py-2 pr-4">Expiry</th>
                <th class="py-2 pr-4">Days left</th>
                <th class="py-2 pr-4">Status</th>
                <th class="py-2 pr-4">Last checked</th>
                <th class="py-2">Actions</th>
              </tr>
            </thead>
            <tbody id="tbody-domains"></tbody>
          </table>
        </div>
        <p id="dash-error" class="mt-3 hidden text-sm text-red-400"></p>
      </section>
    </div>
  </div>

  <script src="./config.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
